<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accedi — LumeAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #131313;
    --bg-card: #1a1a1a;
    --ink: #f5f1e8;
    --ink-dim: #8a857a;
    --accent: #d4ff3f;
    --accent-warm: #ff6b35;
    --border: #2a2a2a;
    --display: 'Fraunces', serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg); color: var(--ink); font-family: var(--mono);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212,255,63,0.06), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,107,53,0.05), transparent 40%);
  }
  .card {
    background: var(--bg-elev); border: 1px solid var(--border);
    padding: 3rem 2.5rem; max-width: 420px; width: 100%; text-align: center;
  }
  .logo {
    font-family: var(--display); font-size: 2rem; font-weight: 800;
    letter-spacing: -0.02em; margin-bottom: 0.5rem;
  }
  .logo span { color: var(--accent); }
  .subtitle { color: var(--ink-dim); font-size: 0.85rem; margin-bottom: 2.5rem; }
  h1 {
    font-family: var(--display); font-size: 1.8rem; font-weight: 600;
    margin-bottom: 1rem; letter-spacing: -0.02em;
  }
  .desc { color: var(--ink-dim); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; }
  .google-btn {
    background: #fff; color: #000; border: none; padding: 0.9rem 1.4rem;
    font-family: var(--mono); font-size: 0.9rem; font-weight: 500; cursor: pointer;
    width: 100%; display: flex; align-items: center; justify-content: center;
    gap: 0.8rem; transition: transform .15s, box-shadow .15s;
    text-decoration: none;
  }
  .google-btn:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--accent); }
  .google-btn svg { width: 20px; height: 20px; }
  .note {
    margin-top: 2rem; padding: 1rem; background: var(--bg-card);
    border: 1px solid var(--border); font-size: 0.75rem; color: var(--ink-dim);
    line-height: 1.5;
  }
  .note .accent { color: var(--accent); font-weight: 500; }
  .back-link {
    display: inline-block; margin-top: 2rem; color: var(--ink-dim);
    text-decoration: none; font-size: 0.8rem; transition: color .2s;
  }
  .back-link:hover { color: var(--ink); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lume<span>AI</span></div>
  <div class="subtitle">━━ AI INFRASTRUCTURE</div>

  <h1>Bentornato</h1>
  <p class="desc">Accedi per gestire i tuoi crediti, la tua API key e vedere lo storico delle richieste.</p>

  <a href="#" id="googleLogin" class="google-btn">
    <svg viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continua con Google
  </a>

  <div class="note">
    🎁 <span class="accent">100 crediti gratis</span> al primo accesso, abbastanza per ~100.000 token con Llama 3.1 8B.
  </div>

  <a href="/" class="back-link">← Torna alla homepage</a>
</div>

<script>
  // L'URL del backend
  const BACKEND_URL = 'https://web-production-f0d2c.up.railway.app';

  document.getElementById('googleLogin').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = `${BACKEND_URL}/v1/auth/google`;
  });
</script>
</body>
</html>
